<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Simulation | SaaS Demo</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .payment-container {
            padding-top: 120px;
            padding-bottom: 80px;
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .payment-card {
            background: var(--surface);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        .payment-header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .payment-header h1 {
            font-size: 1.75rem;
            margin-bottom: 8px;
        }

        .amount-display {
            font-size: 2.5rem;
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--primary);
            margin: 16px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: var(--transition);
            background: #F8FAFC;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: white;
        }

        .input-row {
            display: flex;
            gap: 16px;
        }

        .input-row .form-group {
            flex: 1;
        }

        .card-icons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: flex-end;
        }

        .card-icon {
            height: 24px;
            width: 36px;
            background: #E2E8F0;
            border-radius: 4px;
            /* Placeholder for actual icons */
        }

        .alert-error {
            display: none;
            background: #FEF2F2;
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            margin-bottom: 24px;
            border: 1px solid #FECACA;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar scanned" id="navbar" style="box-shadow: var(--shadow-sm); border-bottom-color: var(--border);">
        <div class="nav-container">
            <a href="index.html" class="logo">SaaS<span>Demo</span></a>
            
            <ul class="nav-links" id="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="payment.html" class="active">Payments</a></li>
            </ul>

            <div class="nav-actions">
                <a href="dashboard.html" class="btn btn-secondary btn-nav">Go Back</a>
            </div>
        </div>
    </nav>

    <div class="payment-container container">
        <div class="payment-card">
            <div class="payment-header">
                <h1>Demo Payment</h1>
                <p>Simulating a secure checkout.</p>
                <div class="amount-display">$99.00</div>
            </div>

            <div class="alert-error" id="payment-error"></div>

            <form id="payment-form">
                
                <div class="form-group">
                    <label for="card-name">Cardholder Name</label>
                    <input type="text" id="card-name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group" style="margin-bottom: 8px;">
                    <label for="card-number">Card Number</label>
                    <input type="text" id="card-number" class="form-control" placeholder="0000 0000 0000 0000" inputmode="numeric" required>
                </div>
                
                <!-- Card icons placeholder -->
                <div class="card-icons">
                    <div class="card-icon" style="background:#1A1F71;color:white;text-align:center;font-size:0.7rem;line-height:24px;font-weight:bold;">VISA</div>
                    <div class="card-icon" style="background:#EB001B;color:white;text-align:center;font-size:0.7rem;line-height:24px;font-weight:bold;">MC</div>
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label for="expiry">Expiry (MM/YY)</label>
                        <input type="text" id="expiry" class="form-control" placeholder="12/26" required>
                    </div>

                    <div class="form-group">
                        <label for="cvv">CVV</label>
                        <input type="text" id="cvv" class="form-control" placeholder="123" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-large" id="payment-submit" style="margin-top: 16px;">
                    Pay $99.00 Now
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 24px; color: var(--text-light); font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Secure Demo Simulation (Do not enter real card data)
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="js/auth.js"></script>
    <script src="js/payment.js"></script>
</body>
</html>
