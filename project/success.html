<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | SaaS Demo</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #D1FAE5 100%);
            padding: 40px 24px;
        }

        .success-card {
            background: var(--surface);
            padding: 56px 48px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .success-icon {
            width: 96px;
            height: 96px;
            background: #D1FAE5;
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-card h1 {
            font-size: 2.25rem;
            margin-bottom: 16px;
        }

        .success-card p {
            color: var(--text-light);
            font-size: 1.125rem;
            margin-bottom: 40px;
        }

        .success-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .success-buttons .btn {
            flex: 1;
        }

        @media (max-width: 480px) {
            .success-card {
                padding: 40px 24px;
            }

            .success-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="success-card">
            
            <div class="success-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h1>Payment Successful</h1>
            <p>Your demo payment has been completed successfully. Thank you for testing our platform.</p>

            <div class="success-buttons">
                <a href="dashboard.html" class="btn btn-primary btn-large">Go to Dashboard</a>
                <a href="index.html" class="btn btn-secondary btn-large">Back to Home</a>
            </div>

        </div>
    </div>

</body>
</html>
